name: build

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (universal binary)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15

      - name: Build
        run: cmake --build build --parallel 3

      - name: Upload plugins
        uses: actions/upload-artifact@v4
        with:
          name: nimbostratus-macos-universal
          path: |
            build/bin/nimbostratus.vst3
            build/bin/nimbostratus.clap

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 3

      - name: Upload plugins
        uses: actions/upload-artifact@v4
        with:
          name: nimbostratus-windows-x64
          path: |
            build/bin/nimbostratus.vst3
            build/bin/nimbostratus.clap

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches project version
        run: |
          ver=$(sed -n 's/^project(.* VERSION \([0-9][0-9.]*\).*/\1/p' CMakeLists.txt)
          tag=${GITHUB_REF_NAME#v}
          base=${tag%%-*}  # strip prerelease suffix, e.g. 1.3.1-rc.1 -> 1.3.1
          if [ "$ver" != "$base" ]; then
            echo "::error::Tag v$tag does not match CMake project version $ver — bump CMakeLists.txt first" >&2
            exit 1
          fi
          echo "Releasing version $tag"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release zips
        run: |
          (cd artifacts/nimbostratus-macos-universal && zip -qr "$GITHUB_WORKSPACE/nimbostratus-$GITHUB_REF_NAME-macos-universal.zip" .)
          (cd artifacts/nimbostratus-windows-x64 && zip -qr "$GITHUB_WORKSPACE/nimbostratus-$GITHUB_REF_NAME-windows-x64.zip" .)
          ls -la *.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: nimbostratus-*.zip
